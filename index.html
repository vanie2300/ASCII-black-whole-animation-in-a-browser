<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D ASCII Black Hole</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'MS Gothic','Yu Gothic','Noto Sans Mono CJK JP',Consolas,monospace;
}
body {
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}
canvas {
    display: block;
    image-rendering: pixelated;
}
#overlay {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.8s ease;
    opacity: 1;
    text-shadow: 0 0 8px rgba(0,0,0,0.9);
    line-height: 1.6;
}
#overlay h1 {
    font-size: 16px;
    font-weight: normal;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.15em;
}
#overlay .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
}
#overlay .fps {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-top: 2px;
}
#overlay.hidden { opacity: 0; }
</style>
</head>
<body>

<canvas id="screen"></canvas>

<div id="overlay">
    <h1>✦ 3D ASCII Black Hole</h1>
    <div class="hint">drag · rotate · watch</div>
    <div class="fps" id="fps"></div>
</div>

<script>
'use strict';

// ============================================================
// CONFIG
// ============================================================
const CONFIG = {
    cols: 140,
    rows: 70,
    charCellW: 12,
    charCellH: 12,
    diskParticles: 80000,
    photonParticles: 25000,
    horizonParticles: 20000,
    shadowRingParticles: 20000,
    starCount: 800,
    rotationSpeedX: 0.00035,
    rotationSpeedY: 0.00025,
    timeSpeed: 0.01,
    autoHideOverlayDelay: 4000,
    starsChar: '\u30FB',
    chars: '\u3000\u3001\u3002\u30FB\u309D\u309E\u3083\u3041\u3043\u3045\u3047\u3049\u3063\u3083\u3085\u3087\u3042\u3044\u3046\u3048\u304A\u304B\u304D\u304F\u3051\u3053\u3055\u3057\u3059\u305B\u305D\u305F\u3061\u3064\u3066\u3068\u306A\u306B\u306C\u306D\u306E\u306F\u3072\u3075\u3078\u307B\u307E\u307F\u3080\u3081\u3082\u3084\u3086\u3088\u3089\u308A\u308B\u308C\u308D\u308F\u3092\u3093\u304C\u3056\u3060\u3070\u3071'
};

// ============================================================
// STATE
// ============================================================
const state = {
    time: 0,
    rotX: 0,
    rotY: 0,
    targetRotX: 0,
    targetRotY: 0,
    isDragging: false,
    lastMX: 0,
    lastMY: 0,
    frames: 0,
    lastFpsTime: 0,
    fps: 0
};

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const fpsEl = document.getElementById('fps');
const overlay = document.getElementById('overlay');
let overlayTimer = null;
let W, H;

function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cw = CONFIG.cols * CONFIG.charCellW;
    const ch = CONFIG.rows * CONFIG.charCellH;
    canvas.width = cw * dpr;
    canvas.height = ch * dpr;
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.textBaseline = 'top';
    W = CONFIG.cols;
    H = CONFIG.rows;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ============================================================
// OVERLAY
// ============================================================
function showOverlay() {
    overlay.classList.remove('hidden');
    if (overlayTimer) clearTimeout(overlayTimer);
    overlayTimer = setTimeout(() => {
        overlay.classList.add('hidden');
    }, CONFIG.autoHideOverlayDelay);
}

showOverlay();

canvas.addEventListener('click', showOverlay);
canvas.addEventListener('touchstart', showOverlay, { passive: true });

// ============================================================
// MATH HELPERS
// ============================================================
function rotateX(p, a) {
    const s = Math.sin(a), c = Math.cos(a);
    return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c };
}

function rotateY(p, a) {
    const s = Math.sin(a), c = Math.cos(a);
    return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c };
}

function rotateZ(p, a) {
    const s = Math.sin(a), c = Math.cos(a);
    return { x: p.x * c - p.y * s, y: p.x * s + p.y * c, z: p.z };
}

function project(p) {
    const z = p.z + 9;
    return {
        x: Math.floor(W / 2 + p.x / z * 95),
        y: Math.floor(H / 2 + p.y / z * 50),
        z
    };
}

function shade(v) {
    v = Math.max(0, Math.min(1, v));
    const g = Math.floor(v * 250 + 5);
    return 'rgb(' + g + ',' + g + ',' + g + ')';
}

function plot(buffer, zbuf, x, y, z, b) {
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    const idx = x + y * W;
    if (z < zbuf[idx]) {
        zbuf[idx] = z;
        const bright = Math.pow(Math.max(0, b), 0.65);
        const ci = Math.min(CONFIG.chars.length - 1, Math.floor(bright * (CONFIG.chars.length - 1)));
        buffer[idx] = { ch: CONFIG.chars[ci], b: bright };
    }
}

// ============================================================
// PARTICLE GENERATORS
// ============================================================
function generateDisk() {
    const data = [];
    for (let i = 0; i < CONFIG.diskParticles; i++) {
        data.push({
            ang: Math.random() * Math.PI * 2,
            baseRadius: 1.2 + Math.random() * 3.0,
            ry: Math.random()
        });
    }
    return data;
}

function generatePhotons() {
    const data = [];
    for (let i = 0; i < CONFIG.photonParticles; i++) {
        data.push({
            ang: Math.random() * Math.PI * 2,
            ry: Math.random()
        });
    }
    return data;
}

function generateHorizon() {
    const data = [];
    for (let i = 0; i < CONFIG.horizonParticles; i++) {
        data.push({ u: Math.random(), v: Math.random() });
    }
    return data;
}

function generateShadowRing() {
    const data = [];
    for (let i = 0; i < CONFIG.shadowRingParticles; i++) {
        data.push({
            ang: Math.random() * Math.PI * 2,
            ry: Math.random(),
            r: 2.0 + Math.random() * 0.5
        });
    }
    return data;
}

function generateStars() {
    const data = [];
    for (let i = 0; i < CONFIG.starCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(1 - Math.random() * (1 - Math.cos(Math.PI / 3)));
        const r = 100 + Math.random() * 150;
        data.push({
            x: r * Math.sin(phi) * Math.cos(theta),
            y: r * Math.sin(phi) * Math.sin(theta),
            z: r * Math.cos(phi),
            bright: 0.15 + Math.random() * 0.35
        });
    }
    return data;
}

// ============================================================
// DATA
// ============================================================
const diskData = generateDisk();
const photonData = generatePhotons();
const horizonData = generateHorizon();
const shadowRingData = generateShadowRing();
const starData = generateStars();

// ============================================================
// RENDER
// ============================================================
function render() {
    const buffer = new Array(W * H);
    const zbuf = new Float32Array(W * H);

    for (let i = 0; i < W * H; i++) {
        buffer[i] = { ch: '\u3000', b: 0 };
        zbuf[i] = 99999;
    }

    const ax = state.rotX;
    const ay = state.rotY;
    const t = state.time;

    // --- Event horizon ---
    for (let i = 0; i < horizonData.length; i++) {
        const h = horizonData[i];
        const theta = 2 * Math.PI * h.u;
        const phi = Math.acos(2 * h.v - 1);
        let p = {
            x: 0.9 * Math.sin(phi) * Math.cos(theta),
            y: 0.9 * Math.sin(phi) * Math.sin(theta),
            z: 0.9 * Math.cos(phi)
        };
        p = rotateX(p, ax);
        p = rotateY(p, ay);
        const pr = project(p);
        if (pr.x >= 0 && pr.x < W && pr.y >= 0 && pr.y < H) {
            const idx = pr.x + pr.y * W;
            if (pr.z < zbuf[idx]) {
                zbuf[idx] = pr.z;
                buffer[idx] = { ch: '\u3000', b: -1 };
            }
        }
    }

    // --- Photon ring ---
    for (let i = 0; i < photonData.length; i++) {
        const d = photonData[i];
        let p = {
            x: 0.95 * Math.cos(d.ang),
            y: (d.ry - 0.5) * 0.05,
            z: 0.95 * Math.sin(d.ang)
        };
        p = rotateX(p, ax);
        p = rotateY(p, ay);
        const pr = project(p);
        const bright = 1.2 + 0.2 * Math.sin(d.ang * 25 + t * 5);
        plot(buffer, zbuf, pr.x, pr.y, pr.z, bright);
    }

    // --- Shadow edge ring ---
    for (let i = 0; i < shadowRingData.length; i++) {
        const s = shadowRingData[i];
        const ang2 = s.ang + t * 0.15;
        const ripple = Math.sin(ang2 * 10 + t * 2) * 0.06;
        const radius = s.r + ripple;
        let p = {
            x: radius * Math.cos(s.ang),
            y: (s.ry - 0.5) * 0.08,
            z: radius * Math.sin(s.ang)
        };
        p = rotateX(p, ax);
        p = rotateY(p, ay);
        const pr = project(p);
        const bright = (0.8 + 0.3 * Math.sin(s.ang * 15 + t * 3)) / (pr.z * 0.07);
        plot(buffer, zbuf, pr.x, pr.y, pr.z, bright);
    }

    // --- Main accretion disk ---
    for (let i = 0; i < diskData.length; i++) {
        const d = diskData[i];
        const ang = d.ang;
        const ripple = Math.sin(ang * 12 + t * 2) * 0.12;
        const thickness = 0.35 + Math.sin(ang * 6 + t) * 0.15;
        const radius = d.baseRadius + ripple;
        let p = {
            x: radius * Math.cos(ang),
            y: (d.ry - 0.5) * thickness,
            z: radius * Math.sin(ang)
        };
        const dist = Math.sqrt(p.x * p.x + p.y * p.y + p.z * p.z);
        const shadowR1 = 0.9, shadowR2 = 2.2;
        let shadowFactor = 1;
        if (dist < shadowR2) {
            const s = Math.max(0, (dist - shadowR1) / (shadowR2 - shadowR1));
            shadowFactor = s * s * (3 - 2 * s);
        }
        const lens = 1 / (dist * dist + 0.08);
        const warp = lens * 0.8;
        p.x += p.x * warp;
        p.y += p.y * warp;
        p.z += p.z * warp * 0.4;
        p = rotateX(p, ax);
        p = rotateY(p, ay);
        const pr = project(p);
        let bright = 1 - (d.baseRadius - 1.2) / 3.2;
        bright *= 0.75 + 0.25 * Math.sin(ang * 20 + t * 4);
        bright *= 1 + 0.6 * Math.cos(ang - ay);
        bright *= 1 / (pr.z * 0.09);
        bright *= shadowFactor;
        plot(buffer, zbuf, pr.x, pr.y, pr.z, bright);
    }

    // --- Canvas output ---
    ctx.clearRect(0, 0, W * CONFIG.charCellW, H * CONFIG.charCellH);
    ctx.font = CONFIG.charCellW + "px 'MS Gothic','Yu Gothic','Noto Sans Mono CJK JP',Consolas,monospace";

    // Background stars
    for (let i = 0; i < starData.length; i++) {
        const s = starData[i];
        let p = { x: s.x, y: s.y, z: s.z };
        if (p.z <= 0) continue;
        const sx = Math.floor(W / 2 + p.x / (p.z + 9) * 95);
        const sy = Math.floor(H / 2 + p.y / (p.z + 9) * 50);
        if (sx < 0 || sx >= W || sy < 0 || sy >= H) continue;
        const bright = s.bright / ((p.z + 9) * 0.025);
        if (bright > 0.01) {
            ctx.fillStyle = shade(bright);
            ctx.fillText(CONFIG.starsChar, sx * CONFIG.charCellW, sy * CONFIG.charCellH);
        }
    }

    // Main buffer
    for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
            const cell = buffer[x + y * W];
            if (cell.b <= 0.01) continue;
            if (cell.b < 0) {
                ctx.fillStyle = '#000';
                ctx.fillRect(x * CONFIG.charCellW, y * CONFIG.charCellH, CONFIG.charCellW, CONFIG.charCellH);
            } else {
                ctx.fillStyle = shade(cell.b);
                ctx.fillText(cell.ch, x * CONFIG.charCellW, y * CONFIG.charCellH);
            }
        }
    }
}

// ============================================================
// MAIN LOOP
// ============================================================
function frame(time) {
    // FPS
    state.frames++;
    if (time - state.lastFpsTime >= 1000) {
        state.fps = state.frames;
        state.frames = 0;
        state.lastFpsTime = time;
        fpsEl.textContent = state.fps + ' FPS';
    }

    // Smooth rotation toward target (from drag)
    state.rotX += (state.targetRotX - state.rotX) * 0.08;
    state.rotY += (state.targetRotY - state.rotY) * 0.08;

    // Auto-rotate when not dragging
    if (!state.isDragging) {
        state.targetRotX += CONFIG.rotationSpeedX;
        state.targetRotY += CONFIG.rotationSpeedY;
    }

    render();
    state.time += CONFIG.timeSpeed;
    requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

// ============================================================
// MOUSE EVENTS
// ============================================================
canvas.addEventListener('mousedown', (e) => {
    state.isDragging = true;
    state.lastMX = e.clientX;
    state.lastMY = e.clientY;
});

window.addEventListener('mousemove', (e) => {
    if (!state.isDragging) return;
    const dx = e.clientX - state.lastMX;
    const dy = e.clientY - state.lastMY;
    state.targetRotY += dx * 0.005;
    state.targetRotX += dy * 0.005;
    state.lastMX = e.clientX;
    state.lastMY = e.clientY;
});

window.addEventListener('mouseup', () => {
    state.isDragging = false;
});

// ============================================================
// TOUCH EVENTS (mobile)
// ============================================================
canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        state.isDragging = true;
        state.lastMX = e.touches[0].clientX;
        state.lastMY = e.touches[0].clientY;
    }
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
    if (!state.isDragging || e.touches.length !== 1) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - state.lastMX;
    const dy = e.touches[0].clientY - state.lastMY;
    state.targetRotY += dx * 0.005;
    state.targetRotX += dy * 0.005;
    state.lastMX = e.touches[0].clientX;
    state.lastMY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => {
    state.isDragging = false;
}, { passive: true });
</script>

</body>
</html>
