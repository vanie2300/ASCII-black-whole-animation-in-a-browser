<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D ASCII Black Hole</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#screen{
    image-rendering:pixelated;
    max-width:100vw;
    max-height:100vh;
}
</style>
</head>
<body>

<canvas id="screen"></canvas>

<script>

const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");

const W = 140;
const H = 70;

const CHARS =
"　。、・ゝゞ〃ぁぃぅぇぉっゃゅょあいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんがざだばぱ";

const DISK_N = 80000;
const PHOTON_N = 25000;
const HORIZON_N = 20000;
const SHADOW_RING_N = 20000;

const CW = 12;
const CH = 12;

const dpr = Math.min(window.devicePixelRatio || 1, 2);

canvas.width = W * CW * dpr;
canvas.height = H * CH * dpr;
canvas.style.width = W * CW + "px";
canvas.style.height = H * CH + "px";
ctx.scale(dpr, dpr);
ctx.textBaseline = "top";

let time = 0;
let ax = 0;
let ay = 0;
let az = 0;

let diskData, photonData, horizonData, shadowRingData;

function rotateX(p,a)
{
    const s=Math.sin(a);
    const c=Math.cos(a);

    return {
        x:p.x,
        y:p.y*c-p.z*s,
        z:p.y*s+p.z*c
    };
}

function rotateY(p,a)
{
    const s=Math.sin(a);
    const c=Math.cos(a);

    return {
        x:p.x*c+p.z*s,
        y:p.y,
        z:-p.x*s+p.z*c
    };
}

function rotateZ(p,a)
{
    const s=Math.sin(a);
    const c=Math.cos(a);

    return {
        x:p.x*c-p.y*s,
        y:p.x*s+p.y*c,
        z:p.z
    };
}

function project(p)
{
    const z = p.z + 9;

    return {
        x:Math.floor(W/2 + p.x/z*95),
        y:Math.floor(H/2 + p.y/z*50),
        z:z
    };
}

function shade(v)
{
    v = Math.max(0, Math.min(1, v));

    const g = Math.floor(v * 250 + 5);

    return `rgb(${g},${g},${g})`;
}

function plot(buffer, zbuf, x, y, z, b)
{
    if(x<0||x>=W||y<0||y>=H) return;

    const idx=x+y*W;

    if(z<zbuf[idx])
    {
        zbuf[idx]=z;

        let bright=Math.max(0,b);

        bright=Math.pow(bright,0.65);

        const ci=Math.min(
            CHARS.length-1,
            Math.floor(bright*(CHARS.length-1))
        );

        buffer[idx]={
            ch:CHARS[ci],
            b:bright
        };
    }
}

function init()
{
    // --- Accretion disk ---
    diskData = [];
    for(let i = 0; i < DISK_N; i++)
    {
        diskData.push({
            ang: Math.random() * Math.PI * 2,
            baseRadius: 1.2 + Math.random() * 3.0,
            ry: Math.random()
        });
    }

    // --- Photon ring ---
    photonData = [];
    for(let i = 0; i < PHOTON_N; i++)
    {
        photonData.push({
            ang: Math.random() * Math.PI * 2,
            ry: Math.random()
        });
    }

    // --- Event horizon sphere ---
    horizonData = [];
    for(let i = 0; i < HORIZON_N; i++)
    {
        horizonData.push({
            u: Math.random(),
            v: Math.random()
        });
    }

    // --- Shadow edge ring ---
    shadowRingData = [];
    for(let i = 0; i < SHADOW_RING_N; i++)
    {
        const ang = Math.random() * Math.PI * 2;
        shadowRingData.push({
            ang,
            ry: Math.random(),
            r: 2.0 + Math.random() * 0.5
        });
    }
}

function frame()
{
    const buffer=new Array(W*H);
    const zbuf=new Float32Array(W*H);

    for(let i=0;i<W*H;i++)
    {
        buffer[i]={
            ch:"　",
            b:0
        };

        zbuf[i]=99999;
    }

    // ==================================================
    // EVENT HORIZON
    // ==================================================

    for(let i=0;i<HORIZON_N;i++)
    {
        const h = horizonData[i];

        const theta=2*Math.PI*h.u;
        const phi=Math.acos(2*h.v-1);

        const r=0.9;

        let p={
            x:r*Math.sin(phi)*Math.cos(theta),
            y:r*Math.sin(phi)*Math.sin(theta),
            z:r*Math.cos(phi)
        };

        p=rotateX(p,ax);
        p=rotateY(p,ay);
        p=rotateZ(p,az);

        const pr=project(p);

        if(
            pr.x>=0 &&
            pr.x<W &&
            pr.y>=0 &&
            pr.y<H
        )
        {
            const idx=pr.x+pr.y*W;

            if(pr.z<zbuf[idx])
            {
                zbuf[idx]=pr.z;

                buffer[idx]={
                    ch:"　",
                    b:-1
                };
            }
        }
    }

    // ==================================================
    // PHOTON RING
    // ==================================================

    for(let i=0;i<PHOTON_N;i++)
    {
        const pData = photonData[i];

        let p={
            x:0.95*Math.cos(pData.ang),
            y:(pData.ry-0.5)*0.05,
            z:0.95*Math.sin(pData.ang)
        };

        p=rotateX(p,ax);
        p=rotateY(p,ay);
        p=rotateZ(p,az);

        const pr=project(p);

        const bright=
            1.2+
            0.2*Math.sin(pData.ang*25+time*5);

        plot(buffer, zbuf, pr.x, pr.y, pr.z, bright);
    }

    // ==================================================
    // SHADOW EDGE RING (photon ring at shadow boundary)
    // ==================================================

    for(let i = 0; i < SHADOW_RING_N; i++)
    {
        const s = shadowRingData[i];

        const ang2 = s.ang + time * 0.15;
        const ripple = Math.sin(ang2 * 10 + time * 2) * 0.06;
        const radius = s.r + ripple;

        let p = {
            x: radius * Math.cos(s.ang),
            y: (s.ry - 0.5) * 0.08,
            z: radius * Math.sin(s.ang)
        };

        p = rotateX(p, ax);
        p = rotateY(p, ay);
        p = rotateZ(p, az);

        const pr = project(p);

        const bright = (0.8 + 0.3 * Math.sin(s.ang * 15 + time * 3)) / (pr.z * 0.07);

        plot(buffer, zbuf, pr.x, pr.y, pr.z, bright);
    }

    // ==================================================
    // MAIN ACCRETION DISK
    // ==================================================

    for(let i=0;i<DISK_N;i++)
    {
        const d = diskData[i];

        const ang = d.ang;

        const ripple=
            Math.sin(ang*12+time*2)*0.12;

        const thickness=
            0.35+
            Math.sin(ang*6+time)*0.15;

        const radius = d.baseRadius + ripple;

        let p={
            x:radius*Math.cos(ang),
            y:(d.ry-0.5)*thickness,
            z:radius*Math.sin(ang)
        };

        const dist=Math.sqrt(
            p.x*p.x+
            p.y*p.y+
            p.z*p.z
        );

        // Black hole shadow
        const shadowR1 = 0.9;
        const shadowR2 = 2.2;
        let shadowFactor = 1;

        if(dist < shadowR2)
        {
            const t = Math.max(0, (dist - shadowR1) / (shadowR2 - shadowR1));
            shadowFactor = t * t * (3 - 2 * t);
        }

        const lens=
            1/(dist*dist+0.15);

        p.x+=p.x*lens*0.45;
        p.y+=p.y*lens*0.45;

        p=rotateX(p,ax);
        p=rotateY(p,ay);
        p=rotateZ(p,az);

        const pr=project(p);

        let bright=
            1-(d.baseRadius-1.2)/3.2;

        bright*=
            0.75+
            0.25*Math.sin(ang*20+time*4);

        bright *= 1 + 0.2 * Math.cos(ang - ay);

        bright*=1/(pr.z*0.09);

        bright *= shadowFactor;

        plot(buffer, zbuf, pr.x, pr.y, pr.z, bright);
    }

    // ==================================================
    // CANVAS OUTPUT
    // ==================================================

    ctx.clearRect(0, 0, W * CW, H * CH);

    ctx.font = (CW) + "px 'MS Gothic','Yu Gothic','Noto Sans Mono CJK JP',Consolas,monospace";

    for(let y=0;y<H;y++)
    {
        for(let x=0;x<W;x++)
        {
            const cell=buffer[x+y*W];

            if(cell.b <= 0.01) continue;

            if(cell.b < 0)
            {
                ctx.fillStyle = "#000";
                ctx.fillRect(x * CW, y * CH, CW, CH);
            }
            else
            {
                ctx.fillStyle = shade(cell.b);
                ctx.fillText(cell.ch, x * CW, y * CH);
            }
        }
    }

    ax+=0.00035;
    ay+=0.00025;
    az+=0.00015;

    time+=0.01;

    requestAnimationFrame(frame);
}

init();
frame();

</script>

</body>
</html>
